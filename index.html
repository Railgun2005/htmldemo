<!DOCTYPE html><html><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
<style>
        canvas {
            image-rendering: smooth;
            position: absolute;
            overflow: hidden
        }
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            max-height: 100vh;
        }
        /* GUI Styles */
        #gui {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 1000;
            min-width: 320px;
            border: 1px solid #333;
        }
        @supports (-webkit-touch-callout: none) {
            #gui {
                max-height: calc(90vh - 80px) !important;
            }
        }
        @media (max-width: 768px) {
            #gui {
                position: fixed;
                top: 0px;
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: calc(100vw - 20px);
                max-width: none;
                min-width: auto;
                max-height: calc(100vh - 50px);
            }
        }
        #gui {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #gui::-webkit-scrollbar {
            display: none;
        }
        #expandableContent {
            display: none;
        }
        #gui h3 {
            margin: 0 0 10px 0;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            font-size: 13px;
        }
        #gui select {
            width: 100%;
            margin-bottom: 15px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px;
            font-family: monospace;
            font-size: 11px;
        }
        #gui .param {
            margin-bottom: 8px;
        }
        #gui label {
            display: block;
            margin-bottom: 2px;
            color: #aaa;
            font-size: 10px;
        }
        #gui input[type="range"] {
            width: 100%;
            height: 20px;
            -webkit-appearance: none;
            /* Critical: removes OS-specific styling */
            appearance: none;
            background: transparent;
            /* Let the track handle background */
            outline: none;
        }
        /* Webkit slider track (Chrome/Safari on all platforms) */
        #gui input[type="range"]::-webkit-slider-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            border: none;
        }
        /* Webkit slider thumb (Chrome/Safari on all platforms) */
        #gui input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            /* Critical: removes OS-specific styling */
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4a9eff;
            /* Your blue color */
            border-radius: 50%;
            cursor: pointer;
            border: none;
            margin-top: -5px;
            /* Center the thumb on the track */
        }
        /* Firefox support */
        #gui input[type="range"]::-moz-range-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            border: none;
        }
        #gui input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #4a9eff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: none;
        }
        #gui input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            border: none;
        }
        #gui .value-control {
            float: right;
        }
        #gui .arrow-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            width: 12px;
            height: 12px;
            cursor: pointer;
            font-size: 8px;
            padding: 0;
            margin: 0 1px;
            display: inline-block;
            text-align: center;
            line-height: 10px;
            vertical-align: top;
            box-sizing: border-box;
        }
        #gui .arrow-btn:hover {
            background: #333;
            border-color: #555;
        }
        #gui .arrow-btn:active {
            background: #333;
            border-color: #555;
        }
        #gui .arrow-btn:focus {
            outline: none;
            background: #333;
        }
        /* Reset any button styles that might be interfering */
        #gui button.arrow-btn {
            background: #333;
            border: 1px solid #555;
            flex: none;
            min-width: 12px;
            max-width: 12px;
        }
        #gui button.arrow-btn:hover {
            background: #333;
            border-color: #555;
        }
        #gui .value {
            color: #4a9eff;
            font-weight: bold;
            display: inline-block;
            min-width: 40px;
            text-align: center;
            margin: 0 2px;
            vertical-align: top;
            user-select: none;
            cursor: pointer;
        }
        #gui .value.editing {
            background: #222;
            border: 1px solid #4a9eff;
            padding: 0 2px;
            border-radius: 2px;
        }
        #gui .value input {
            background: transparent;
            border: none;
            color: #4a9eff;
            font-weight: bold;
            font-family: monospace;
            font-size: inherit;
            width: 100%;
            text-align: center;
            outline: none;
        }
        #gui .value input[type="number"] {
            -webkit-appearance: none;
            -moz-appearance: textfield;
        }
        #gui .value input[type="number"]::-webkit-outer-spin-button,
        #gui .value input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #gui .button-group {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        #gui button {
            flex: 1;
            min-width: 70px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            border-radius: 3px;
        }
        #gui .button-group button:hover {
            background: #333;
            border-color: #666;
        }
        #gui #toggleGui {
            width: 100%;
            background: transparent;
            color: #666;
            /* Match the subtitle color */
            border: none;
            padding: 0px 0px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
            /* Much smaller */
            border-radius: 0;
            margin-top: 1px;
            text-align: center;
            box-sizing: border-box;
            transition: opacity 0.3s ease;
            opacity: 0.5;
            /* Very subtle by default */
            font-style: italic;
            /* Make it look like a subtitle */
        }
        #gui #toggleGui:hover {
            opacity: 0.8;
            /* Only become visible on hover */
        }
        /* Drag and drop overlay */
        #dropOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74, 158, 255, 0.2);
            border: 3px dashed #4a9eff;
            display: none;
            z-index: 9999;
            pointer-events: none;
        }
        #dropOverlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #dropOverlay .message {
            background: rgba(0, 0, 0, 0.9);
            color: #4a9eff;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
        }
        /* Notification styles */
        .notification {
            position: fixed;
            top: 50px;
            right: 10px;
            background: rgba(74, 158, 255, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 10000;
            transition: opacity 0.3s;
        }
    </style>
    <title>Herry</title>
</head>
<body ondrop="drop(event)" ondragover="allowDrop(event)">
    <canvas id="canvas">Enable JavaScript in your browser</canvas>
    <div id="dropOverlay">
        <div class="message">Drop JSON file to load point</div>
    </div>
    <div id="gui">
        <button id="toggleGui">Expand Controls ▼</button>
        <div id="expandableContent">
            <label style="color: white; margin-bottom: 5px; display: block;">Select Point:</label>
            <select id="pointSelector"></select>
            <div class="button-group">
                <button id="shareBtn">Share URL</button>
                <button id="saveBtn">Save PNG</button>
                <button id="exportBtn">Export JSON</button>
                <button id="importBtn">Import JSON</button>
            </div>
            <div id="parameters"></div>
            
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>
    </div>
    <script type="text/javascript" src="main.js"></script>
</body></html>
